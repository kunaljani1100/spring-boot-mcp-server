# --- MCP server identity ---
spring.ai.mcp.server.name=weather-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.stdio=true
spring.ai.mcp.server.instructions=Provides current forecast and weather alert lookups for a small set of demo US cities/states.

# --- Critical for STDIO transport ---
# The server talks JSON-RPC over stdin/stdout. Anything else written to
# stdout (banners, console log lines, System.out.println) will corrupt the
# protocol stream and break the connection. Never remove these lines
# for a STDIO server.
spring.main.banner-mode=off
spring.main.web-application-type=none
logging.pattern.console=

# Send logs to a file instead, so you can still debug the server.
logging.file.name=mcp-weather-server.log
logging.level.root=INFO
logging.level.com.example.mcpserver=DEBUG
